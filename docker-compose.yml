services:
  db:
    image: postgres:18
    container_name: inventory_db
    environment:
      POSTGRES_DB: inventory_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: dask1234
    ports:
      - "5432:5432"

  web:
    build: .
    container_name: inventory_api
    command: python manage.py runserver 0.0.0.0:8000
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - db